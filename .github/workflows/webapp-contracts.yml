name: Web app contracts

"on":
  pull_request:
    paths:
      - "04_Web_app/**"
      - "02_Code/01_PyMC/mmm_core/model_registry.py"
      - "02_Code/01_PyMC/mmm_core/forecast_engine.py"
      - "02_Code/01_PyMC/tests/test_model_registry.py"
      - "02_Code/02_Budget_optimizer/budget_optimizer.py"
      - "02_Code/03_AC_forecast/ac_forecast.py"
      - ".github/workflows/webapp-contracts.yml"
  push:
    branches:
      - main
    paths:
      - "04_Web_app/**"
      - "02_Code/01_PyMC/mmm_core/model_registry.py"
      - "02_Code/01_PyMC/mmm_core/forecast_engine.py"
      - "02_Code/01_PyMC/tests/test_model_registry.py"
      - "02_Code/02_Budget_optimizer/budget_optimizer.py"
      - "02_Code/03_AC_forecast/ac_forecast.py"
      - ".github/workflows/webapp-contracts.yml"

permissions:
  contents: read

jobs:
  decision-result-v1:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install contract test dependencies
        run: >-
          python -m pip install
          "jsonschema>=4.21,<5"
          "pandas==3.0.1"
          "openpyxl==3.1.5"
          "argon2-cffi==25.1.0"

      - name: Run source-only web contract tests
        run: python -B -m unittest discover -s 04_Web_app/tests -p "test_*.py" -v

      - name: Run model registry serving-mode tests
        run: python -B -m unittest 02_Code/01_PyMC/tests/test_model_registry.py -v

  frontend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: 04_Web_app/frontend
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: 04_Web_app/frontend/package-lock.json

      - name: Install locked frontend dependencies
        run: npm ci

      - name: Generate contract types
        run: npm run generate:contracts

      - name: Verify generated contract types are committed
        run: git diff --exit-code -- src/shared/api/generated

      - name: Run TypeScript typecheck
        run: npm run typecheck

      - name: Run ESLint
        run: npm run lint

      - name: Run frontend unit tests
        run: npm run test

      - name: Build production frontend
        run: npm run build
