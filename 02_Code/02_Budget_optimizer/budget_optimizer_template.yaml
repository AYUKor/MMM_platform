# Budget optimizer template.
# Copy this file per optimization task and fill constraints.

run_id: budget_optimization_q1_daily_example
layer: budget_optimizer
decision_policy_file: optimizer_decision_policy_v2.yaml

model_ref:
  source: registry
  registry_root: ../../03_Outputs/01_PyMC_outputs/00_Model_registry
  channel: production
  expected_package_id: null

paths:
  campaign_input_dir: ../../00_Data/00_Future_Campaigns/01_Inbox
  campaign_file: null
  campaign_sheet: null
  model_ready_panel: ../../00_Data/02_2025_2026Q1_second_pass/panel_final_v3.parquet
  output_dir: ../../03_Outputs/02_Budget_optimizer_outputs/02_Budget_optimizer_05072026_example

validation:
  fail_on_parse_issues: true
  fail_on_unsupported: true

# Future denominators are taken from this fixed historical analog year.
# Missing segment x geo x analog-date coverage fails closed.
future_controls:
  strategy: historical_analog_period
  analog_year: 2025
  missing_geo_policy: nearest_available_year_same_geo

budget:
  total_budget_rub: null
  vat_policy: exclude_vat
  include_creative_costs: false

objective:
  primary: maximize_incremental_turnover_p50
  # balanced = safety/model-quality gates first, then configured objective;
  # strict = additionally rejects candidates containing non-primary objective evidence.
  # Diagnostic rows are never optimizer objectives under either policy.
  model_risk_policy: balanced
  guardrails:
    min_roas_p50: null
  business_threshold_policy: business_threshold_policy_v1.yaml

constraints:
  channels_allowed: []
  geos_allowed: []
  channel_min_share: {}
  channel_max_share: {}
  geo_min_share: {}
  geo_max_share: {}
  mandatory_channels: []
  mandatory_geos: []

optimizer:
  targets:
    - turnover_per_user
    - orders_per_user
    - avg_basket
  scenario_6:
    enabled: true
    default_method: adaptive_marginal_posterior
    search_candidates: 2048
    runtime_safety_max_candidates: 4096
    search_posterior_samples: 128
    final_posterior_samples: 600
    finalists: 6
    allocation_quantum_rub: 100000
    transfer_steps_rub:
      - 5000000
      - 1000000
      - 250000
      - 50000
    beam_width: 8
    max_candidate_pool: 12
    support_limits:
      - p99
      - robust_upper
    random_seed: 42
    final_random_seed: 10042

scenarios:
  include_current_or_business_plan: true
  include_equal_split_baseline: true
  include_optimizer_recommendation: true

report:
  intervals:
    - p10
    - p50
    - p90
  explain_as: "available budget -> recommended allocation -> expected outcome"
