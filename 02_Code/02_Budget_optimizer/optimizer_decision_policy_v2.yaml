# Allocation recommendation policy for high-resolution adaptive Scenario 6.
# Search resolution is configured separately and never rounds the scored media plan.
schema_version: 2.0.0
policy_id: optimizer_recommendation_materiality_v2_surgical_search
currency: RUB

reliability:
  full_coverage_min: 0.99
  usable_partial_coverage_min: 0.95
  prefer_support_safety_before_expected_rto: true
  interval_width_is_tiebreak_only: true

materiality:
  min_incremental_rto_gain_rub: 1000000
  min_incremental_rto_gain_share: 0.01
  min_positive_delta_probability: 0.80
  min_moved_budget_rub: 500000
  min_moved_budget_share: 0.005
  line_item_rounding_rub: 0
  max_p10_degradation_share: 0.01
  noninferiority_probability: 0.80

recommendation:
  reliability_improvement_can_override_economic_materiality: true
  keep_source_when_change_is_not_material: true
  partial_safe_plan_requires_manual_remainder: true
  never_claim_global_optimum: true

scenario_5:
  support_limit: p95
  allocation_objective: closest_source_geo_channel_mix
  preserve_source_cells: true
  allow_new_geo_channel_cells: false
  allow_unallocated_remainder: true
