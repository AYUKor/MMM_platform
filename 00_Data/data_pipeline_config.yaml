  targets_2026: 00_Data/02_2025_2026Q1_second_pass/01_Raw_Data_v2/daily_metrics_by_region_itog.parquet
  geo_mapping: 00_Data/02_2025_2026Q1_second_pass/01_Raw_Data_v2/geo_mapping_media_to_model_v2.csv
